<svg
  xmlns="http://www.w3.org/2000/svg"
  width="321.26"
  height="207.87"
  viewBox="0 0 321.26 207.87"
  style="background:#FAF6F0"
>
  <!-- 85mm × 55mm @ 96dpi ≈ 321.26 × 207.87px  |  Druckformat -->
  <!-- Schnittmarken (3mm Beschnitt) -->
  <g stroke="#999" stroke-width="0.5" fill="none" opacity="0.4">
    <!-- oben links -->
    <line x1="0" y1="11.34" x2="7.56" y2="11.34"/>
    <line x1="11.34" y1="0" x2="11.34" y2="7.56"/>
    <!-- oben rechts -->
    <line x1="321.26" y1="11.34" x2="313.70" y2="11.34"/>
    <line x1="309.92" y1="0" x2="309.92" y2="7.56"/>
    <!-- unten links -->
    <line x1="0" y1="196.53" x2="7.56" y2="196.53"/>
    <line x1="11.34" y1="207.87" x2="11.34" y2="200.31"/>
    <!-- unten rechts -->
    <line x1="321.26" y1="196.53" x2="313.70" y2="196.53"/>
    <line x1="309.92" y1="207.87" x2="309.92" y2="200.31"/>
  </g>

  <!-- Kartenbereich (Beschnitt je 3mm = 11.34px) -->
  <clipPath id="card">
    <rect x="11.34" y="11.34" width="298.58" height="185.19"/>
  </clipPath>

  <g clip-path="url(#card)">
    <!-- Hintergrund -->
    <rect x="11.34" y="11.34" width="298.58" height="185.19" fill="#FAF6F0"/>

    <!-- Warmer Akzentstreifen links -->
    <rect x="11.34" y="11.34" width="5" height="185.19" fill="#7C5232"/>

    <!-- Dezente Holzmaserung-Linie -->
    <line x1="16.34" y1="11.34" x2="16.34" y2="196.53" stroke="#C8A882" stroke-width="0.5" opacity="0.4"/>

    <!-- Logo-Bereich oben links -->
    <!-- Lamp-Icon (vereinfacht) -->
    <g transform="translate(34, 30)">
      <!-- Schirm -->
      <path d="M8 22 L28 22 L23 6 L13 6 Z" fill="#C8A882" opacity="0.9"/>
      <!-- Schirm-Kante oben -->
      <rect x="12" y="3.5" width="12" height="3" rx="1.5" fill="#B8936E"/>
      <!-- Schirm-Kante unten -->
      <rect x="7" y="21" width="22" height="2" rx="1" fill="#A07852"/>
      <!-- Glühbirne -->
      <ellipse cx="18" cy="22" rx="2.5" ry="3" fill="#FAF6F0" opacity="0.7"/>
      <!-- Schaft -->
      <rect x="16.5" y="25" width="3" height="13" rx="1.5" fill="#7C5232"/>
      <!-- Fuß -->
      <ellipse cx="18" cy="39" rx="7" ry="2" fill="#4A2C17"/>
    </g>

    <!-- Markenname -->
    <text
      x="70" y="47"
      font-family="'Cormorant Garamond', Georgia, serif"
      font-size="18"
      font-weight="400"
      fill="#2A1A0E"
      letter-spacing="-0.3"
    >Altholz</text>
    <text
      x="70" y="63"
      font-family="'Cormorant Garamond', Georgia, serif"
      font-size="18"
      font-weight="300"
      font-style="italic"
      fill="#7C5232"
      letter-spacing="-0.3"
    >Design</text>

    <!-- Tagline -->
    <text
      x="70" y="77"
      font-family="'DM Sans', Arial, sans-serif"
      font-size="5.5"
      font-weight="400"
      fill="#C8A882"
      letter-spacing="1.5"
    >HANDGEFERTIGTE ALTHOLZLEUCHTEN</text>

    <!-- Trennlinie -->
    <line x1="34" y1="110" x2="145" y2="110" stroke="#EDE0CC" stroke-width="0.75"/>

    <!-- Kontaktdaten unten links -->
    <!-- Web-Icon -->
    <circle cx="38" cy="127" r="4" fill="none" stroke="#C8A882" stroke-width="0.8"/>
    <ellipse cx="38" cy="127" rx="2.2" ry="4" fill="none" stroke="#C8A882" stroke-width="0.6"/>
    <line x1="34" y1="127" x2="42" y2="127" stroke="#C8A882" stroke-width="0.6"/>
    <text x="46" y="130" font-family="'DM Sans', Arial, sans-serif" font-size="6.5" fill="#6B4431" letter-spacing="0.2">altholz-design.at</text>

    <!-- Tel-Icon -->
    <path d="M35.5 139 C35 138 35 137 36 136.3 L37.2 135.5 C37.6 135.2 37.6 134.6 37.3 134.2 L36.4 133 C36.1 132.6 35.5 132.5 35.1 132.8 L34.2 133.5 C32.8 134.5 32.9 136.3 33.8 137.8 L35.5 139 Z" fill="none" stroke="#C8A882" stroke-width="0.8"/>
    <text x="46" y="142" font-family="'DM Sans', Arial, sans-serif" font-size="6.5" fill="#6B4431" letter-spacing="0.2">+43 XXX XXX XXXX</text>

    <!-- Adresse -->
    <text x="46" y="155" font-family="'DM Sans', Arial, sans-serif" font-size="6" fill="#A08060" letter-spacing="0.1">Musterstraße 1, 3400 Klosterneuburg</text>

    <!-- Rechte Seite: Name & Rolle -->
    <line x1="185" y1="30" x2="185" y2="167" stroke="#EDE0CC" stroke-width="0.75"/>

    <text
      x="200" y="80"
      font-family="'Cormorant Garamond', Georgia, serif"
      font-size="14"
      font-weight="500"
      fill="#2A1A0E"
      letter-spacing="-0.2"
    >Vorname Nachname</text>
    <text
      x="200" y="94"
      font-family="'DM Sans', Arial, sans-serif"
      font-size="6"
      font-weight="400"
      fill="#C8A882"
      letter-spacing="1.2"
    >INHABER · HANDWERKSMEISTER</text>

    <!-- Dekoratives Element rechts unten -->
    <g opacity="0.12" transform="translate(255, 130)">
      <path d="M8 22 L28 22 L23 6 L13 6 Z" fill="#7C5232"/>
      <rect x="16.5" y="25" width="3" height="13" rx="1.5" fill="#7C5232"/>
      <ellipse cx="18" cy="39" rx="7" ry="2" fill="#4A2C17"/>
    </g>
  </g>
</svg>
