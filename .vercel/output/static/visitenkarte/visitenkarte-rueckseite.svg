<svg
  xmlns="http://www.w3.org/2000/svg"
  width="321.26"
  height="207.87"
  viewBox="0 0 321.26 207.87"
>
  <!-- Rückseite: dunkel, zentriertes Logo -->
  <clipPath id="card-back">
    <rect x="11.34" y="11.34" width="298.58" height="185.19"/>
  </clipPath>

  <!-- Schnittmarken -->
  <g stroke="#999" stroke-width="0.5" fill="none" opacity="0.4">
    <line x1="0" y1="11.34" x2="7.56" y2="11.34"/>
    <line x1="11.34" y1="0" x2="11.34" y2="7.56"/>
    <line x1="321.26" y1="11.34" x2="313.70" y2="11.34"/>
    <line x1="309.92" y1="0" x2="309.92" y2="7.56"/>
    <line x1="0" y1="196.53" x2="7.56" y2="196.53"/>
    <line x1="11.34" y1="207.87" x2="11.34" y2="200.31"/>
    <line x1="321.26" y1="196.53" x2="313.70" y2="196.53"/>
    <line x1="309.92" y1="207.87" x2="309.92" y2="200.31"/>
  </g>

  <g clip-path="url(#card-back)">
    <!-- Hintergrund dunkel -->
    <rect x="11.34" y="11.34" width="298.58" height="185.19" fill="#2A1A0E"/>

    <!-- Warme Struktur — subtile Linien -->
    <line x1="11.34" y1="11.34" x2="309.92" y2="196.53" stroke="#3D2B1F" stroke-width="40" opacity="0.3"/>
    <line x1="309.92" y1="11.34" x2="11.34" y2="196.53" stroke="#3D2B1F" stroke-width="40" opacity="0.3"/>

    <!-- Akzentrahmen innen -->
    <rect x="22" y="22" width="277.26" height="163.53" fill="none" stroke="#C8A882" stroke-width="0.5" opacity="0.2"/>

    <!-- Zentrales Logo-Icon -->
    <g transform="translate(141.63, 62)">
      <!-- Schirm -->
      <path d="M-20 28 L20 28 L13 -6 L-13 -6 Z" fill="#C8A882" opacity="0.85"/>
      <!-- Schirm-Kante oben -->
      <rect x="-14" y="-10" width="28" height="5" rx="2.5" fill="#B8936E"/>
      <!-- Schirm-Kante unten -->
      <rect x="-22" y="26" width="44" height="3.5" rx="1.75" fill="#A07852"/>
      <!-- Glühbirne -->
      <ellipse cx="0" cy="28" rx="5" ry="6" fill="#FAF6F0" opacity="0.5"/>
      <ellipse cx="0" cy="28" rx="2.5" ry="3.5" fill="#FAF6F0" opacity="0.4"/>
      <!-- Lichtschein -->
      <ellipse cx="0" cy="28" rx="18" ry="12" fill="#FAF6F0" opacity="0.04"/>
      <!-- Schaft -->
      <rect x="-2.5" y="34" width="5" height="24" rx="2.5" fill="#7C5232"/>
      <!-- Fuß -->
      <ellipse cx="0" cy="59" rx="14" ry="4" fill="#4A2C17"/>
      <ellipse cx="0" cy="57" rx="10" ry="3" fill="#5C3D2E"/>
    </g>

    <!-- Markenname zentriert -->
    <text
      x="160.63" y="148"
      font-family="'Cormorant Garamond', Georgia, serif"
      font-size="22"
      font-weight="400"
      fill="#FAF6F0"
      letter-spacing="-0.3"
      text-anchor="middle"
    >Altholz <tspan font-weight="300" font-style="italic" fill="#C8A882">Design</tspan></text>

    <!-- Tagline -->
    <text
      x="160.63" y="165"
      font-family="'DM Sans', Arial, sans-serif"
      font-size="5"
      fill="#C8A882"
      letter-spacing="2"
      text-anchor="middle"
    >HANDGEFERTIGTE ALTHOLZLEUCHTEN · WIEN</text>
  </g>
</svg>
