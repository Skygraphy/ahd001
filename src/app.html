<!doctype html>
<html lang="de" data-theme="altholz">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Handgefertigte Altholzlampen im Vintage-Stil — Altholz Design, Klosterneuburg" />
    <meta name="theme-color" content="#2A1A0E" />
    <!-- TODO (DSGVO): Google Fonts lädt Schriften von einem externen Server und überträgt dabei IP-Adressen.
         Für DSGVO-Konformität die Schriften lokal hosten: Dateien herunterladen und per @font-face in app.css einbinden.
         Siehe: https://fonts.google.com (Schriften herunterladen) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
